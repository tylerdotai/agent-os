# Agent OS Configuration
# Load with: cargo run -- --config agent-os.yml

server:
  host: "0.0.0.0"
  port: 8080

ollama:
  url: "http://192.168.0.247:11434"
  model: "qwen3.5:35b-a3b"

storage:
  path: "/var/agent-os/storage"

system:
  system_prompt: |
    You are an autonomous AI agent. Complete tasks using tools.
    When done, output: TASK_COMPLETE: <result>

# Tool registry - dynamically loaded
tools:
  - name: get_time
    description: "Get current timestamp"
    handler: builtin
    parameters: {}

  - name: list_directory
    description: "List files in directory"
    handler: builtin
    parameters:
      properties:
        path:
          type: string
          default: "."

  - name: read_file
    description: "Read file contents"
    handler: builtin
    parameters:
      properties:
        path:
          type: string
      required:
        - path

  - name: http_get
    description: "Fetch URL content"
    handler: builtin
    parameters:
      properties:
        url:
          type: string
      required:
        - url

  - name: search_web
    description: "Search via SearXNG"
    handler: builtin
    parameters:
      properties:
        query:
          type: string
      required:
        - query

  - name: execute_command
    description: "Run shell command"
    handler: builtin
    parameters:
      properties:
        command:
          type: string
      required:
        - command

  - name: spawn_agent
    description: "Spawn a child agent"
    handler: builtin
    parameters:
      properties:
        name:
          type: string
        system_prompt:
          type: string
      required:
        - name

  - name: send_message
    description: "Send message to another agent"
    handler: builtin
    parameters:
      properties:
        to_agent:
          type: string
        content:
          type: string
      required:
        - to_agent
        - content

# Agent permissions (future use)
permissions:
  allow_spawn: true
  allow_network: true
  allow_filesystem: true
  allow_execute: true

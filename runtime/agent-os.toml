# Agent OS Configuration
[server]
host = "0.0.0.0"
port = 8080

[ollama]
url = "http://192.168.0.247:11434"
model = "qwen3.5:35b-a3b"
# provider: "ollama" (default), "openai", "anthropic"
provider = "ollama"

# Model providers - keys from environment variables
[providers.ollama]
url = "http://192.168.0.247:11434"
model = "qwen3.5:35b-a3b"

[providers.openai]
url = "https://api.openai.com/v1"
# Key from OPENAI_API_KEY env var

[providers.anthropic]
url = "https://api.anthropic.com"
# Key from ANTHROPIC_API_KEY env var

# Default provider
default = "ollama"

[storage]
path = "/var/agent-os/storage"

[system]
system_prompt = "You are an autonomous AI agent. Complete tasks using tools.\nWhen done, output: TASK_COMPLETE: <result>"

# Tool registry
[[tools]]
name = "get_time"
description = "Get current timestamp"
handler = "builtin"
permissions = []

[[tools]]
name = "list_directory"
description = "List files in directory"
handler = "builtin"
permissions = ["filesystem"]

[[tools]]
name = "read_file"
description = "Read file contents"
handler = "builtin"
permissions = ["filesystem"]

[[tools]]
name = "http_get"
description = "Fetch URL content"
handler = "builtin"
permissions = ["network"]

[[tools]]
name = "search_web"
description = "Search via SearXNG"
handler = "builtin"
permissions = ["network"]

[[tools]]
name = "execute_command"
description = "Run shell command"
handler = "builtin"
permissions = ["execute"]

[[tools]]
name = "spawn_agent"
description = "Spawn a child agent"
handler = "builtin"
permissions = ["spawn"]

[[tools]]
name = "send_message"
description = "Send message to another agent"
handler = "builtin"
permissions = []

# Permissions
[permissions]
allow_spawn = true
allow_network = true
allow_filesystem = true
allow_execute = true

# External MCP Servers
[[mcp_servers]]
name = "searxng"
url = "http://192.168.0.247:18080/mcp"
